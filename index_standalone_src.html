<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>國營考題複習｜SOE Exam Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&family=Noto+Serif+TC:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: oklch(0.985 0.004 90);
    --surface: oklch(1 0 0);
    --surface-2: oklch(0.965 0.006 90);
    --surface-3: oklch(0.94 0.008 90);
    --line: oklch(0.9 0.008 90);
    --line-strong: oklch(0.82 0.012 90);
    --ink: oklch(0.22 0.012 240);
    --ink-2: oklch(0.42 0.012 240);
    --ink-3: oklch(0.58 0.012 240);
    --accent: oklch(0.48 0.11 222);
    --accent-soft: oklch(0.94 0.03 222);
    --accent-ink: oklch(0.32 0.09 222);
    --warn: oklch(0.62 0.16 35);
    --warn-soft: oklch(0.95 0.04 35);
    --warn-ink: oklch(0.42 0.14 35);
    --ok: oklch(0.58 0.13 150);
    --ok-soft: oklch(0.94 0.04 150);
    --ok-ink: oklch(0.38 0.12 150);
    --gold: oklch(0.78 0.13 80);
    --gold-soft: oklch(0.96 0.04 80);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC", system-ui, sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"palt";}
  body{min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;color:inherit;}
  ::selection{background:var(--accent-soft);color:var(--accent-ink);}
  /* scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:10px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-3);}
  ::-webkit-scrollbar-track{background:transparent;}

  .mono{font-family:"JetBrains Mono", monospace;}
  .serif{font-family:"Noto Serif TC", serif;}

  /* App layout */
  .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;}
  .mobile-bar{display:none;}
  .sidebar-scrim{display:none;}
  @media (max-width: 900px){
    .app{grid-template-columns:1fr;}
    .sidebar{position:fixed;top:0;left:0;width:300px;max-width:85vw;z-index:90;transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 32px rgba(0,0,0,.18);}
    .sidebar.open{transform:translateX(0);}
    .sidebar-scrim{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:89;opacity:0;pointer-events:none;transition:opacity .22s;}
    .sidebar-scrim.open{opacity:1;pointer-events:auto;}
    .mobile-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;}
    .mobile-bar .brand{font-size:13px;}
    .mobile-bar .brand-mark{width:30px;height:30px;font-size:15px;}
  }

  /* Sidebar */
  .sidebar{background:var(--surface-2);border-right:1px solid var(--line);padding:24px 18px;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg, var(--accent) 0%, oklch(0.6 0.12 200) 100%);display:grid;place-items:center;color:#fff;font-weight:800;font-family:"Noto Serif TC";font-size:18px;letter-spacing:-1px;box-shadow:0 4px 12px -2px oklch(0.48 0.11 222 / 0.35);}
  .brand-title{font-weight:700;font-size:15px;line-height:1.2;}
  .brand-sub{font-size:11px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;font-family:"JetBrains Mono";margin-top:2px;}
  .nav-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-family:"JetBrains Mono";font-weight:500;padding:0 8px;margin-bottom:6px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;color:var(--ink-2);cursor:pointer;transition:background .15s;}
  .nav-item:hover{background:var(--surface-3);color:var(--ink);}
  .nav-item.active{background:var(--ink);color:var(--surface);font-weight:500;}
  .nav-item.active .nav-count{background:rgba(255,255,255,.15);color:#fff;}
  .nav-count{margin-left:auto;font-family:"JetBrains Mono";font-size:11px;background:var(--surface-3);padding:2px 7px;border-radius:20px;color:var(--ink-3);}
  .subject-item{position:relative;display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;transition:background .15s;}
  .subject-item:hover{background:var(--surface-3);}
  .subject-item.active{background:var(--surface);box-shadow:0 0 0 1px var(--line-strong), 0 1px 2px rgba(0,0,0,.03);}
  .subject-dot{width:9px;height:9px;border-radius:3px;flex:none;}
  .subject-name{font-size:13.5px;font-weight:500;line-height:1.3;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .subject-meta{font-size:11px;color:var(--ink-3);font-family:"JetBrains Mono";}
  .btn-add-subject{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px dashed var(--line-strong);border-radius:8px;color:var(--ink-3);font-size:12.5px;transition:all .15s;}
  .btn-add-subject:hover{color:var(--ink);border-color:var(--ink-3);background:var(--surface);}

  /* Main */
  .main{padding:32px 40px 80px;max-width:1100px;width:100%;}
  @media (max-width: 900px){ .main{padding:20px 18px 80px;} .page-title{font-size:26px;} }
  @media (max-width: 600px){
    .page-header{flex-direction:column;align-items:stretch;}
    .header-actions{justify-content:flex-start;flex-wrap:wrap;}
    .header-actions .btn{flex:1;min-width:0;justify-content:center;}
    .qcard{padding:18px 18px;border-radius:12px;}
    .q-stem{font-size:14.5px;}
    .q-opt{font-size:13.5px;padding:11px 12px;}
    .q-actions{opacity:1;}
    .practice-card{padding:22px 18px;border-radius:14px;}
    .modal{max-height:92vh;border-radius:12px;}
    .modal-body{padding:18px;}
    .row{grid-template-columns:1fr;}
  }

  /* Top header */
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:8px;flex-wrap:wrap;}
  .crumb{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-family:"JetBrains Mono";margin-bottom:8px;}
  .page-title{font-family:"Noto Serif TC";font-weight:700;font-size:34px;letter-spacing:-.01em;line-height:1.15;margin:0;}
  .page-sub{font-size:13.5px;color:var(--ink-2);margin-top:8px;max-width:560px;line-height:1.55;}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;white-space:nowrap;}
  .btn-primary{background:var(--ink);color:var(--surface);}
  .btn-primary:hover{background:oklch(0.32 0.012 240);}
  .btn-secondary{background:var(--surface);border-color:var(--line-strong);color:var(--ink);}
  .btn-secondary:hover{border-color:var(--ink-3);background:var(--surface-2);}
  .btn-ghost{color:var(--ink-2);}
  .btn-ghost:hover{background:var(--surface-3);color:var(--ink);}
  .btn-warn{background:var(--warn);color:#fff;}
  .btn-warn:hover{background:oklch(0.55 0.16 35);}
  .btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px;}

  /* Tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:24px 0 24px;overflow-x:auto;}
  .tab{padding:11px 16px;font-size:13.5px;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap;transition:color .15s;}
  .tab:hover{color:var(--ink-2);}
  .tab.active{color:var(--ink);border-bottom-color:var(--ink);}
  .tab-count{font-family:"JetBrains Mono";font-size:11px;background:var(--surface-3);padding:1px 7px;border-radius:20px;color:var(--ink-3);margin-left:6px;}
  .tab.active .tab-count{background:var(--accent-soft);color:var(--accent-ink);}

  /* Filter bar */
  .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
  .search{flex:1;min-width:200px;position:relative;}
  .search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line-strong);border-radius:8px;background:var(--surface);font-size:13px;transition:border-color .15s;}
  .search input:focus{outline:none;border-color:var(--ink-3);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);}
  .chip{padding:6px 11px;border-radius:20px;background:var(--surface);border:1px solid var(--line);font-size:12px;color:var(--ink-2);cursor:pointer;transition:all .15s;}
  .chip:hover{border-color:var(--line-strong);}
  .chip.active{background:var(--ink);color:var(--surface);border-color:var(--ink);}

  /* Question card */
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:14px;transition:border-color .15s, box-shadow .15s;}
  .qcard:hover{border-color:var(--line-strong);}
  .qcard.flagged{border-color:oklch(0.85 0.06 35);background:linear-gradient(0deg, var(--warn-soft) 0%, var(--surface) 60%);}
  .q-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px;}
  .q-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .q-num{font-family:"JetBrains Mono";font-size:11.5px;font-weight:500;color:var(--ink-3);background:var(--surface-2);padding:3px 8px;border-radius:5px;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.02em;}
  .badge-single{background:var(--accent-soft);color:var(--accent-ink);}
  .badge-multi{background:var(--gold-soft);color:oklch(0.4 0.12 70);}
  .badge-tag{background:var(--surface-3);color:var(--ink-2);}
  .badge-mistake{background:var(--warn-soft);color:var(--warn-ink);}
  .q-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
  .qcard:hover .q-actions{opacity:1;}
  .q-actions button{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;color:var(--ink-3);}
  .q-actions button:hover{background:var(--surface-3);color:var(--ink);}
  .q-stem{font-size:15px;line-height:1.7;color:var(--ink);margin-bottom:14px;text-wrap:pretty;}
  .q-options{display:grid;gap:7px;}
  .q-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--surface-2);border:1px solid transparent;border-radius:8px;font-size:14px;line-height:1.55;cursor:pointer;transition:all .15s;text-align:left;width:100%;}
  .q-opt:hover{background:var(--surface-3);}
  .q-opt.correct{background:var(--ok-soft);border-color:oklch(0.78 0.08 150);color:var(--ok-ink);}
  .q-opt.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink);}
  .q-opt.wrong{background:var(--warn-soft);border-color:oklch(0.78 0.1 35);color:var(--warn-ink);}
  .q-opt-letter{font-family:"JetBrains Mono";font-weight:600;font-size:13px;width:22px;flex:none;}
  .q-reveal{margin-top:16px;padding:14px 16px;background:var(--surface-2);border-left:3px solid var(--accent);border-radius:6px;font-size:13px;line-height:1.65;color:var(--ink-2);}
  .q-reveal-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-ink);font-family:"JetBrains Mono";font-weight:600;margin-bottom:6px;}
  .q-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:12px;flex-wrap:wrap;}
  .q-stat{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--ink-3);font-family:"JetBrains Mono";}
  .q-stat span strong{color:var(--ink-2);font-weight:500;}

  /* Empty state */
  .empty{padding:64px 24px;text-align:center;color:var(--ink-3);}
  .empty-mark{width:64px;height:64px;margin:0 auto 16px;border-radius:16px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-3);}
  .empty-title{font-family:"Noto Serif TC";font-size:20px;color:var(--ink);font-weight:600;margin-bottom:8px;}
  .empty-sub{font-size:13.5px;line-height:1.6;max-width:380px;margin:0 auto;}
  .empty .btn{margin-top:18px;}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:oklch(0.18 0.01 240 / 0.55);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:100;padding:24px;animation:fadeIn .15s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal{background:var(--surface);border-radius:16px;max-width:780px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 56px -16px rgba(0,0,0,.25);overflow:hidden;}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-family:"Noto Serif TC";font-size:18px;font-weight:600;}
  .modal-body{padding:24px;overflow-y:auto;flex:1;}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--surface-2);}
  .close-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3);}
  .close-btn:hover{background:var(--surface-3);color:var(--ink);}

  /* Form */
  .field{display:block;margin-bottom:16px;}
  .field-label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:6px;letter-spacing:.02em;}
  .field-help{font-size:11.5px;color:var(--ink-3);margin-top:4px;line-height:1.5;}
  .input,.textarea,.select{width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:8px;background:var(--surface);font-size:13.5px;transition:border-color .15s;}
  .input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .textarea{resize:vertical;min-height:120px;font-family:"JetBrains Mono";font-size:12.5px;line-height:1.6;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* Practice mode */
  .practice-shell{max-width:760px;margin:0 auto;}
  .practice-progress{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
  .progress-bar{flex:1;height:6px;background:var(--surface-3);border-radius:20px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg, var(--accent), oklch(0.62 0.12 200));border-radius:20px;transition:width .35s ease;}
  .progress-text{font-family:"JetBrains Mono";font-size:12px;color:var(--ink-2);font-weight:500;}
  .practice-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:32px;box-shadow:0 1px 2px rgba(0,0,0,.02);}
  .score-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:var(--ok-soft);color:var(--ok-ink);font-size:12px;font-weight:600;font-family:"JetBrains Mono";}
  .score-pill.bad{background:var(--warn-soft);color:var(--warn-ink);}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:14px;margin-bottom:32px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .stat-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-family:"JetBrains Mono";font-weight:500;}
  .stat-value{font-family:"Noto Serif TC";font-size:32px;font-weight:600;margin-top:6px;line-height:1.1;letter-spacing:-.01em;}
  .stat-sub{font-size:12px;color:var(--ink-3);margin-top:4px;}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:200;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translate(-50%, 12px);opacity:0;}to{transform:translate(-50%, 0);opacity:1;}}

  /* Hide focus rings for mouse users */
  button:focus:not(:focus-visible){outline:none;}

  /* Tweaks panel hook */
  .tweaks-tag{margin-left:6px;padding:1px 6px;background:var(--surface-3);border-radius:4px;font-size:10px;font-family:"JetBrains Mono";color:var(--ink-3)}

  /* AI Analysis */
  .ai-block{margin-top:14px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);overflow:hidden;}
  .ai-head{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--surface);}
  .ai-spark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg, oklch(0.62 0.14 290), oklch(0.55 0.13 222));display:grid;place-items:center;color:#fff;}
  .ai-title{font-size:12.5px;font-weight:600;letter-spacing:.02em;}
  .ai-sub{font-size:11px;color:var(--ink-3);font-family:"JetBrains Mono";}
  .ai-actions{margin-left:auto;display:flex;gap:4px;}
  .ai-actions button{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--ink-3);transition:all .15s;}
  .ai-actions button:hover{background:var(--surface-3);color:var(--ink);}
  .ai-body{padding:18px 18px;font-size:13.5px;line-height:1.75;color:var(--ink);}
  .ai-body h4{margin:0 0 6px;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);font-family:"JetBrains Mono";font-weight:600;}
  .ai-section{padding:12px 0;border-top:1px dashed var(--line);}
  .ai-section:first-child{padding-top:2px;border-top:0;}
  .ai-section p{margin:0;white-space:pre-wrap;text-wrap:pretty;}
  .ai-loading{display:flex;align-items:center;gap:10px;padding:18px;color:var(--ink-2);font-size:13px;}
  .ai-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite ease-in-out;}
  .ai-dot:nth-child(2){animation-delay:.15s;}
  .ai-dot:nth-child(3){animation-delay:.3s;}
  @keyframes pulse{0%,80%,100%{opacity:.25;transform:scale(.9);}40%{opacity:1;transform:scale(1.1);}}
  .ai-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:7px;font-size:12px;font-weight:500;background:linear-gradient(135deg, oklch(0.55 0.14 290), oklch(0.52 0.13 250));color:#fff;transition:filter .15s;}
  .ai-btn:hover{filter:brightness(1.07);}
  .ai-btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line-strong);}
  .ai-btn.ghost:hover{background:var(--surface-3);color:var(--ink);}
  .ai-error{padding:12px 16px;background:var(--warn-soft);color:var(--warn-ink);font-size:12.5px;border-radius:8px;margin:14px;}

  /* === AI sensei brand === */
  :root{
    --gemini: oklch(0.68 0.18 30);
    --gemini-soft: oklch(0.95 0.05 30);
    --gemini-ink: oklch(0.42 0.16 30);
    --claude: oklch(0.55 0.16 285);
    --claude-soft: oklch(0.95 0.05 285);
    --claude-ink: oklch(0.4 0.15 285);
  }

  /* AI tag + button variants */
  .ai-tag{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.1em;padding:1px 6px;border-radius:20px;margin-left:6px;vertical-align:1px;font-weight:600;}
  .ai-tag.claude{background:var(--claude-soft);color:var(--claude-ink);}
  .ai-tag.gemini{background:var(--gemini-soft);color:var(--gemini-ink);}

  .ai-spark.claude{background:linear-gradient(135deg, oklch(0.62 0.16 285), oklch(0.5 0.14 250));}
  .ai-spark.gemini{background:linear-gradient(135deg, oklch(0.68 0.18 30), oklch(0.62 0.18 60));}
  .ai-block.claude{border-color:oklch(0.88 0.04 285);}
  .ai-block.claude .ai-head{background:linear-gradient(180deg, oklch(0.98 0.015 285), var(--surface));}

  .ai-btn.claude{background:linear-gradient(135deg, oklch(0.55 0.16 285), oklch(0.5 0.14 250));}
  .ai-btn.gemini{background:linear-gradient(135deg, oklch(0.68 0.18 30), oklch(0.62 0.18 60));}

  /* Sidebar sensei dots */
  .sensei-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;}
  .sensei-dot.claude{background:linear-gradient(135deg, oklch(0.62 0.16 285), oklch(0.5 0.14 250));box-shadow:0 0 0 3px oklch(0.95 0.05 285);}
  .sensei-dot.gemini{background:linear-gradient(135deg, oklch(0.68 0.18 30), oklch(0.62 0.18 60));box-shadow:0 0 0 3px oklch(0.95 0.05 30);}

  /* === Gemini page === */
  .gemini-page{max-width:880px;}
  .g-title-mark{
    display:inline-grid;place-items:center;width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg, oklch(0.68 0.18 30), oklch(0.6 0.2 295));
    color:#fff;font-family:"Noto Serif TC";font-weight:900;font-size:22px;
    vertical-align:-8px;margin-right:10px;
    box-shadow:0 6px 14px -4px oklch(0.6 0.18 30 / 0.4);transform:rotate(-3deg);
  }
  .pill{
    display:inline-flex;align-items:center;gap:7px;padding:6px 12px;
    background:var(--surface);border:1px solid var(--line);border-radius:20px;
    font-size:11.5px;color:var(--ink-2);font-family:"JetBrains Mono";font-weight:500;
  }
  .pill-dot{width:6px;height:6px;border-radius:50%;background:var(--gemini);box-shadow:0 0 0 3px var(--gemini-soft);}

  /* Key vault */
  .g-keyvault{
    background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;margin:22px 0;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:all .2s;
  }
  .g-keyvault.locked{background:linear-gradient(135deg, var(--surface) 60%, oklch(0.96 0.04 140) 200%);border-color:oklch(0.86 0.05 140);}
  .g-kv-icon{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-2);flex:none;}
  .g-keyvault.locked .g-kv-icon{background:oklch(0.95 0.04 140);color:oklch(0.38 0.12 140);}
  .g-kv-text{flex:1;min-width:160px;}
  .g-kv-label{font-size:13px;font-weight:600;}
  .g-kv-sub{font-size:11.5px;color:var(--ink-3);font-family:"JetBrains Mono";}
  .g-kv-sub a{color:var(--gemini-ink);}
  .g-kv-input{flex:1;min-width:200px;padding:9px 12px;border:1px solid var(--line-strong);border-radius:9px;font-size:12.5px;background:var(--surface-2);}
  .g-kv-input:focus{outline:none;border-color:var(--gemini);background:var(--surface);box-shadow:0 0 0 3px var(--gemini-soft);}

  .btn-mini{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--surface-2);border:1px solid var(--line-strong);color:var(--ink-2);transition:all .15s;display:inline-flex;align-items:center;gap:5px;cursor:pointer;}
  .btn-mini:hover{border-color:var(--ink-3);color:var(--ink);}
  .btn-mini.primary{background:var(--ink);border-color:var(--ink);color:#fff;}
  .btn-mini.primary:hover{background:oklch(0.3 0.02 280);}

  /* Composer */
  .g-composer{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:6px;
    box-shadow:0 1px 0 #fff, 0 12px 28px -16px oklch(0.4 0.04 280 / 0.15);
    position:relative;
  }
  .g-composer::before{
    content:"";position:absolute;inset:-2px;border-radius:20px;z-index:-1;
    background:linear-gradient(135deg, var(--gemini), oklch(0.6 0.2 295), oklch(0.66 0.13 195));
    opacity:0;transition:opacity .25s;
  }
  .g-composer:focus-within::before{opacity:.35;}
  .g-composer-inner{padding:16px 18px 12px;}
  .g-composer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .g-ch-title{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-family:"JetBrains Mono";display:flex;align-items:center;gap:7px;}
  .g-ch-title::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gemini);}
  .g-clear{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--ink-3);cursor:pointer;}
  .g-clear:hover{background:var(--surface-3);color:var(--ink);}
  .g-composer textarea{width:100%;border:0;background:transparent;font-size:15px;line-height:1.7;min-height:140px;max-height:380px;resize:vertical;color:var(--ink);font-family:inherit;}
  .g-composer textarea:focus{outline:none;}
  .g-composer textarea::placeholder{color:var(--ink-3);}
  .g-composer-foot{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface-2);border-radius:13px;margin:4px;gap:12px;flex-wrap:wrap;}
  .g-scope{display:flex;gap:6px;flex-wrap:wrap;}
  .g-chip{padding:5px 11px;border-radius:18px;background:var(--surface);border:1px solid var(--line);font-size:11.5px;color:var(--ink-2);font-weight:500;cursor:pointer;transition:all .15s;}
  .g-chip:hover{border-color:var(--line-strong);color:var(--ink);}
  .g-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .g-cta{display:flex;align-items:center;gap:10px;}
  .g-hint{font-size:11px;color:var(--ink-3);}
  .g-hint kbd{display:inline-block;padding:1px 5px;border-radius:4px;border:1px solid var(--line-strong);background:var(--surface);font-size:10px;color:var(--ink-2);font-family:inherit;margin:0 1px;}
  .g-solve{
    display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;
    background:linear-gradient(135deg, var(--gemini), oklch(0.62 0.21 15));color:#fff;font-weight:700;font-size:13.5px;
    box-shadow:0 6px 14px -4px oklch(0.6 0.2 30 / 0.4), inset 0 1px 0 oklch(1 0 0 / 0.3);
    transition:all .15s;cursor:pointer;border:0;
  }
  .g-solve:hover:not(:disabled){transform:translateY(-1px);}
  .g-solve:disabled{opacity:.6;cursor:not-allowed;}
  .g-spinner{width:14px;height:14px;border-radius:50%;border:2px solid oklch(1 0 0 / 0.35);border-top-color:#fff;animation:gspin 0.8s linear infinite;}
  @keyframes gspin{to{transform:rotate(1turn);}}

  .g-quick{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .g-quick-label{font-size:11px;color:var(--ink-3);letter-spacing:.06em;}
  .g-quick-item{padding:6px 11px;border-radius:18px;font-size:12px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);transition:all .15s;cursor:pointer;}
  .g-quick-item:hover{border-color:var(--gemini);color:var(--gemini-ink);background:var(--gemini-soft);}

  /* Result */
  .g-result{margin-top:32px;}
  .g-loading-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
  .g-loading-card::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg, transparent, oklch(1 0 0 / 0.6), transparent);transform:translateX(-100%);animation:gshim 1.8s infinite;}
  @keyframes gshim{to{transform:translateX(100%);}}
  .g-loading-spin{width:42px;height:42px;border-radius:50%;background:conic-gradient(from 0deg, var(--gemini), oklch(0.6 0.2 295), oklch(0.66 0.13 195), var(--gemini));-webkit-mask:radial-gradient(circle, transparent 55%, #000 56%);mask:radial-gradient(circle, transparent 55%, #000 56%);animation:gspin 1.4s linear infinite;flex:none;}

  .g-err{background:linear-gradient(180deg, var(--gemini-soft) 0%, var(--surface) 100%);border:1px solid oklch(0.82 0.1 30);border-radius:14px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;}
  .g-err-icon{width:36px;height:36px;border-radius:10px;background:#fff;color:var(--gemini-ink);display:grid;place-items:center;flex:none;}
  .g-err-title{font-weight:700;font-size:14px;color:var(--gemini-ink);margin-bottom:3px;}
  .g-err-msg{font-size:12.5px;color:var(--ink-2);word-break:break-word;}

  .g-result-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
  .g-result-title{font-family:"Noto Serif TC";font-weight:800;font-size:22px;letter-spacing:-.01em;}

  .g-sections{display:grid;gap:14px;}
  .g-sec{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;animation:gSlideUp .4s ease backwards;}
  .g-sec:nth-child(1){animation-delay:.02s;}
  .g-sec:nth-child(2){animation-delay:.08s;}
  .g-sec:nth-child(3){animation-delay:.14s;}
  .g-sec:nth-child(4){animation-delay:.2s;}
  @keyframes gSlideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .g-sec-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line);}
  .g-sec-num{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:"Noto Serif TC";font-weight:900;font-size:17px;flex:none;color:#fff;}
  .g-sec-kicker{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-3);margin-bottom:1px;}
  .g-sec-title{font-family:"Noto Serif TC";font-weight:700;font-size:17px;letter-spacing:-.005em;}
  .g-sec-body{padding:16px 22px 20px;font-size:14.5px;line-height:1.85;color:var(--ink);text-wrap:pretty;}
  .g-sec-body p{margin:0 0 10px;}
  .g-sec-body p:last-child{margin-bottom:0;}
  .g-sec-body ul, .g-sec-body ol{margin:0 0 10px;padding-left:22px;}
  .g-sec-body li{margin:3px 0;}
  .g-sec-body strong{font-weight:700;color:var(--ink);}
  .g-sec-body code{font-family:"JetBrains Mono";font-size:.88em;background:var(--surface-3);padding:1px 6px;border-radius:5px;}
  .g-sec-body mark{background:linear-gradient(180deg, transparent 60%, oklch(0.95 0.07 80) 60%);color:inherit;padding:0 2px;}

  .g-sec-1 .g-sec-num{background:linear-gradient(135deg, oklch(0.68 0.18 30), oklch(0.6 0.2 15));}
  .g-sec-2 .g-sec-num{background:linear-gradient(135deg, oklch(0.6 0.2 295), oklch(0.55 0.2 260));}
  .g-sec-3 .g-sec-num{background:linear-gradient(135deg, oklch(0.66 0.13 195), oklch(0.55 0.14 220));}
  .g-sec-4 .g-sec-num{background:linear-gradient(135deg, oklch(0.78 0.15 80), oklch(0.65 0.16 50));}
  .g-sec-raw .g-sec-num{background:linear-gradient(135deg, var(--ink-2), var(--ink));}
  .g-sec-1 .g-sec-body{font-size:16px;font-weight:500;background:linear-gradient(180deg, oklch(0.96 0.04 30) 0%, var(--surface) 100%);}
  .g-sec-1 .g-sec-body strong{color:var(--gemini-ink);}

  /* === AI Mistake Diagnostic === */
  .diag{margin-bottom:8px;}
  .diag-card{
    background:linear-gradient(180deg, var(--surface) 0%, oklch(0.97 0.02 80) 100%);
    border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:0 1px 0 #fff, 0 8px 24px -12px oklch(0.4 0.04 80 / 0.15);
  }
  .diag-head{
    display:flex;align-items:center;gap:14px;
    padding:18px 20px;border-bottom:1px solid var(--line);
    background:linear-gradient(135deg, oklch(0.96 0.04 70), var(--surface));
  }
  .diag-mark{
    width:42px;height:42px;border-radius:12px;flex:none;
    background:linear-gradient(135deg, oklch(0.62 0.16 285), oklch(0.68 0.18 30));
    display:grid;place-items:center;color:#fff;
    box-shadow:0 6px 14px -4px oklch(0.6 0.18 30 / 0.35);
  }
  .diag-text{flex:1;min-width:0;}
  .diag-title{font-family:"Noto Serif TC";font-weight:800;font-size:18px;letter-spacing:-.01em;}
  .diag-sub{font-size:12px;color:var(--ink-3);margin-top:3px;font-family:"JetBrains Mono",monospace;}
  .diag-actions{display:flex;gap:6px;}
  .diag-body{padding:18px 20px;}

  .diag-row{margin-bottom:14px;}
  .diag-row-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-family:"JetBrains Mono",monospace;font-weight:600;margin-bottom:8px;}
  .diag-providers{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media (max-width:600px){.diag-providers{grid-template-columns:1fr;}}
  .diag-prov{
    display:flex;align-items:center;gap:12px;
    padding:12px 14px;border-radius:12px;background:var(--surface);
    border:1.5px solid var(--line);cursor:pointer;text-align:left;
    transition:all .15s;
  }
  .diag-prov:hover{border-color:var(--line-strong);}
  .diag-prov.active.claude{border-color:var(--claude);background:linear-gradient(135deg, var(--claude-soft), var(--surface));}
  .diag-prov.active.gemini{border-color:var(--gemini);background:linear-gradient(135deg, var(--gemini-soft), var(--surface));}
  .diag-prov-dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .diag-prov-dot.claude{background:linear-gradient(135deg, oklch(0.62 0.16 285), oklch(0.5 0.14 250));}
  .diag-prov-dot.gemini{background:linear-gradient(135deg, oklch(0.68 0.18 30), oklch(0.62 0.18 60));}
  .diag-prov-name{font-weight:600;font-size:14px;}
  .diag-prov-tag{font-size:11px;color:var(--ink-3);margin-top:1px;}

  .diag-cta{
    width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    padding:14px 20px;border-radius:12px;
    background:linear-gradient(135deg, oklch(0.55 0.16 285), oklch(0.68 0.18 30));
    color:#fff;font-weight:700;font-size:15px;
    border:0;cursor:pointer;
    box-shadow:0 8px 18px -6px oklch(0.6 0.16 320 / 0.45), inset 0 1px 0 oklch(1 0 0 / 0.3);
    transition:all .15s;
  }
  .diag-cta:hover{transform:translateY(-1px);}
  .diag-cta-sub{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.22);font-size:11.5px;font-weight:600;}

  .diag-loading{display:flex;align-items:center;gap:14px;}
  .diag-spinner{
    width:38px;height:38px;border-radius:50%;
    background:conic-gradient(from 0deg, oklch(0.55 0.16 285), oklch(0.68 0.18 30), oklch(0.66 0.13 195), oklch(0.55 0.16 285));
    -webkit-mask:radial-gradient(circle, transparent 55%, #000 56%);mask:radial-gradient(circle, transparent 55%, #000 56%);
    animation:gspin 1.4s linear infinite;flex:none;
  }

  .diag-result{padding-top:8px;}
  .diag-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:12px;}
  .diag-section{
    border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;
    animation:diagFadeIn .4s ease backwards;
  }
  .diag-section:nth-child(1){animation-delay:.02s;}
  .diag-section:nth-child(2){animation-delay:.08s;}
  .diag-section:nth-child(3){animation-delay:.14s;}
  .diag-section:nth-child(4){animation-delay:.2s;}
  @keyframes diagFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .diag-section-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .diag-section-glyph{font-size:22px;line-height:1;}
  .diag-section-kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:600;}
  .diag-section-title{font-family:"Noto Serif TC";font-weight:700;font-size:15px;line-height:1.3;margin-top:1px;}
  .diag-section-body{font-size:13.5px;line-height:1.75;color:var(--ink);text-wrap:pretty;}
  .diag-section-body p{margin:0 0 8px;}
  .diag-section-body p:last-child{margin-bottom:0;}
  .diag-section-body ul,.diag-section-body ol{margin:0 0 8px;padding-left:20px;}
  .diag-section-body li{margin:3px 0;}
  .diag-section-body strong{font-weight:700;}
  .diag-section-body code{font-family:"JetBrains Mono",monospace;font-size:.88em;background:var(--surface-3);padding:1px 5px;border-radius:4px;}
</style>
</head>
